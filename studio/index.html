<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorldOrbit Studio v2.4</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(240, 180, 100, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(120, 255, 215, 0.1), transparent 22%),
          linear-gradient(160deg, #02060a 0%, #0a1722 44%, #071019 100%);
        color: #edf6ff;
        font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
      }

      main {
        width: min(1600px, calc(100vw - 24px));
        margin: 12px auto 24px;
        display: grid;
        gap: 16px;
      }

      .hero {
        padding: 22px 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: rgba(7, 16, 25, 0.72);
        backdrop-filter: blur(16px);
      }

      .hero strong {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #f0b464;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .hero p {
        margin: 0;
        max-width: 82ch;
        color: rgba(237, 246, 255, 0.74);
        line-height: 1.6;
      }

      #studio {
        min-width: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <strong>WorldOrbit Studio v2.4.0</strong>
        <h1>Canvas-First Atlas Editing</h1>
        <p>
          Diese Referenz-App verwendet direkt <code>@worldorbit/editor</code> auf Basis von
          <code>schema 2.0</code>. Sie verbindet Atlas-Outline, Inspector, Live-Source,
          SVG-/Embed-Vorschau und die erste Orbit-Handle-Bearbeitung in einer Oberfläche.
        </p>
      </section>

      <div id="studio"></div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "@worldorbit/core": "../packages/core/dist/index.js",
          "@worldorbit/viewer": "../packages/viewer/dist/index.js",
          "@worldorbit/viewer/viewer-state": "../packages/viewer/dist/viewer-state.js",
          "@worldorbit/markdown": "../packages/markdown/dist/index.js",
          "@worldorbit/editor": "../packages/editor/dist/index.js"
        }
      }
    </script>
    <script type="module" src="./studio.js"></script>
  </body>
</html>
