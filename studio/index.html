<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorldOrbit Studio v2.5.17</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(240, 180, 100, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(120, 255, 215, 0.1), transparent 22%),
        linear-gradient(160deg, #02060a 0%, #0a1722 44%, #071019 100%);
      color: #edf6ff;
      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
    }

    main {
      width: min(1600px, calc(100vw - 24px));
      margin: 12px auto 24px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .hero {
      padding: 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(7, 16, 25, 0.72);
      backdrop-filter: blur(16px);
    }

    .hero strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #f0b464;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero p {
      margin: 0;
      max-width: 82ch;
      color: rgba(237, 246, 255, 0.74);
      line-height: 1.6;
    }

    #studio {
      min-width: 0;
    }

    .studio-app {
      display: grid;
      gap: 16px;
    }

    .studio-toolbar {
      display: grid;
      gap: 12px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(7, 16, 25, 0.72);
      backdrop-filter: blur(16px);
    }

    .studio-toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .studio-toolbar button,
    .studio-toolbar input[type="range"] {
      accent-color: #f0b464;
    }

    .studio-toolbar button {
      border: 1px solid rgba(240, 180, 100, 0.2);
      border-radius: 999px;
      background: rgba(240, 180, 100, 0.08);
      color: #edf6ff;
      font: 600 13px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      padding: 10px 14px;
    }

    .studio-toolbar button[aria-pressed="true"] {
      border-color: rgba(255, 214, 138, 0.34);
      background: rgba(255, 214, 138, 0.12);
      color: #ffdda9;
    }

    .studio-toolbar button:focus-visible,
    .studio-toolbar input:focus-visible {
      outline: 2px solid rgba(255, 214, 138, 0.95);
      outline-offset: 2px;
    }

    .studio-range {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(237, 246, 255, 0.76);
      font: 600 12px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .studio-range input {
      width: 120px;
    }

    .studio-toolbar-row-meta {
      justify-content: space-between;
    }

    .studio-file {
      color: #edf6ff;
      font: 700 13px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      letter-spacing: 0.04em;
    }

    .studio-file[data-state="dirty"] {
      color: #ffd58a;
    }

    .studio-message {
      color: rgba(237, 246, 255, 0.74);
      font: 500 13px/1.5 "Segoe UI Variable", "Segoe UI", sans-serif;
    }

    .studio-message[data-state="error"] {
      color: #ffb2b2;
    }

    .studio-message[data-state="warning"] {
      color: #ffd58a;
    }

    .studio-message[data-state="clean"] {
      color: #c7ffe5;
    }

    .studio-editor-root {
      min-width: 0;
    }

    @media (max-width: 960px) {
      .studio-toolbar-row-meta {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <strong>WorldOrbit Studio v2.5.17</strong>
      <h1>WorldOrbit Visual Editor</h1>
      <p>
        This reference app loads version-pinned WorldOrbit runtime packages from UNPKG so the
        browser always resolves a concrete published build instead of a floating package endpoint.
      </p>
    </section>

    <div id="studio" data-example-url="../examples/iyath.schema21.worldorbit"></div>
  </main>

  <script type="importmap">
      {
        "imports": {
        "@worldorbit/core": "https://unpkg.com/worldorbit@2.5.17/packages/core/dist/index.js",
        "@worldorbit/viewer": "https://unpkg.com/worldorbit@2.5.17/packages/viewer/dist/index.js",
        "@worldorbit/viewer/viewer-state": "https://unpkg.com/worldorbit@2.5.17/packages/viewer/dist/viewer-state.js",
        "@worldorbit/markdown": "https://unpkg.com/worldorbit@2.5.17/packages/markdown/dist/index.js",
        "@worldorbit/editor": "https://unpkg.com/worldorbit@2.5.17/packages/editor/dist/index.js"
        }
      }
      </script>
  <script type="module" src="studio.js"></script>
</body>

</html>
