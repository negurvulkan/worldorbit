<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
  <script src="https://unpkg.com/worldorbit@2.6.0/dist/unpkg/worldorbit.min.js"></script>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      #view {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="view"></div>
    <script>
      const src = `system Iyath
star Iyath`;

      const loaded = WorldOrbit.loadWorldOrbitSource(src);

      WorldOrbit.createInteractiveViewer(document.getElementById('view'), {
        document: loaded.document
      });

      console.log('success', loaded);
    </script>
  </body>
</html>
