<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      #view {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="view"></div>
    <script type="module">
      import {
        createInteractiveViewer,
        loadWorldOrbitSource,
      } from "https://unpkg.com/worldorbit@3.0.2/dist/unpkg/worldorbit.esm.js";

      const src = `system Iyath
star Iyath`;

      const loaded = loadWorldOrbitSource(src);

      createInteractiveViewer(document.getElementById('view'), {
        document: loaded.document
      });

      console.log('success', loaded);
    </script>
  </body>
</html>
