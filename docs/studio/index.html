<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WorldOrbit Studio v5.0.0</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(240, 180, 100, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(120, 255, 215, 0.1), transparent 22%),
        linear-gradient(160deg, #02060a 0%, #0a1722 44%, #071019 100%);
      color: #edf6ff;
      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
    }

    main {
      width: min(1600px, calc(100vw - 24px));
      margin: 12px auto 24px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .hero {
      padding: 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(7, 16, 25, 0.72);
      backdrop-filter: blur(16px);
    }

    .hero strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #f0b464;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero p {
      margin: 0;
      max-width: 82ch;
      color: rgba(237, 246, 255, 0.74);
      line-height: 1.6;
    }

    #studio {
      min-width: 0;
    }

    .studio-app {
      display: grid;
      gap: 16px;
    }

    .studio-toolbar {
      display: grid;
      gap: 12px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(7, 16, 25, 0.72);
      backdrop-filter: blur(16px);
    }

    .studio-toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .studio-toolbar button,
    .studio-toolbar input[type="range"] {
      accent-color: #f0b464;
    }

    .studio-toolbar button {
      border: 1px solid rgba(240, 180, 100, 0.2);
      border-radius: 999px;
      background: rgba(240, 180, 100, 0.08);
      color: #edf6ff;
      font: 600 13px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      padding: 10px 14px;
    }

    .studio-toolbar button[aria-pressed="true"] {
      border-color: rgba(255, 214, 138, 0.34);
      background: rgba(255, 214, 138, 0.12);
      color: #ffdda9;
    }

    .studio-toolbar button:focus-visible,
    .studio-toolbar input:focus-visible {
      outline: 2px solid rgba(255, 214, 138, 0.95);
      outline-offset: 2px;
    }

    .studio-range {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(237, 246, 255, 0.76);
      font: 600 12px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .studio-range input {
      width: 120px;
    }

    .studio-toolbar-row-meta {
      justify-content: space-between;
    }

    .studio-file {
      color: #edf6ff;
      font: 700 13px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      letter-spacing: 0.04em;
    }

    .studio-file[data-state="dirty"] {
      color: #ffd58a;
    }

    .studio-message {
      color: rgba(237, 246, 255, 0.74);
      font: 500 13px/1.5 "Segoe UI Variable", "Segoe UI", sans-serif;
    }

    .studio-message[data-state="error"] {
      color: #ffb2b2;
    }

    .studio-message[data-state="warning"] {
      color: #ffd58a;
    }

    .studio-message[data-state="clean"] {
      color: #c7ffe5;
    }

    .studio-editor-root {
      min-width: 0;
    }

    .studio-modal {
      width: min(1100px, calc(100vw - 32px));
      max-width: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 0;
      background: rgba(6, 14, 22, 0.96);
      color: #edf6ff;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
    }

    .studio-modal::backdrop {
      background: rgba(2, 7, 12, 0.72);
      backdrop-filter: blur(8px);
    }

    .studio-modal-card {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .studio-modal-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .studio-modal-header strong {
      display: block;
      margin-bottom: 6px;
      font: 700 13px/1.2 "Segoe UI Variable", "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffdda9;
    }

    .studio-modal-header p {
      margin: 0;
      color: rgba(237, 246, 255, 0.72);
      line-height: 1.5;
    }

    .studio-modal-textarea,
    .studio-modal-code {
      width: 100%;
      min-height: min(62vh, 680px);
      margin: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      background: rgba(9, 20, 30, 0.96);
      color: #edf6ff;
      padding: 16px;
      box-sizing: border-box;
      font: 500 13px/1.6 "Cascadia Code", "Consolas", monospace;
    }

    .studio-modal-textarea {
      resize: vertical;
      white-space: pre;
      overflow: auto;
    }

    .studio-modal-code {
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .studio-modal-diagnostics {
      display: grid;
      gap: 10px;
      max-height: 220px;
      overflow: auto;
    }

    .studio-modal-diagnostic {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      padding: 12px 14px;
    }

    .studio-modal-diagnostic[data-state="error"] {
      border-color: rgba(255, 120, 120, 0.28);
    }

    .studio-modal-diagnostic[data-state="warning"] {
      border-color: rgba(240, 180, 100, 0.24);
    }

    .studio-modal-diagnostic strong {
      display: block;
      margin-bottom: 4px;
      font: 700 11px/1.2 "Segoe UI Variable", "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .studio-modal-diagnostic p,
    .studio-modal-note {
      margin: 0;
      color: rgba(237, 246, 255, 0.82);
      line-height: 1.5;
    }

    .studio-modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .studio-modal button,
    .studio-modal textarea:focus-visible {
      outline: 2px solid rgba(255, 214, 138, 0.95);
      outline-offset: 2px;
    }

    .studio-modal button {
      border: 1px solid rgba(240, 180, 100, 0.2);
      border-radius: 999px;
      background: rgba(240, 180, 100, 0.08);
      color: #edf6ff;
      font: 600 13px/1.4 "Segoe UI Variable", "Segoe UI", sans-serif;
      padding: 10px 14px;
    }

    @media (max-width: 960px) {
      .studio-toolbar-row-meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .studio-modal {
        width: calc(100vw - 16px);
      }

      .studio-modal-header {
        flex-direction: column;
      }

      .studio-modal-actions {
        justify-content: stretch;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <strong>WorldOrbit Studio v5.0.0</strong>
      <h1>WorldOrbit Visual Editor</h1>
      <p>
        This reference app loads WorldOrbit runtime packages from the local docs asset bundle and
        keeps authoring compact with focused source and embed modals.
      </p>
    </section>

    <div id="studio" data-example-url="../examples/studio.current.worldorbit"></div>
  </main>

  <script type="importmap">
      {
        "imports": {
        "@worldorbit/core": "../assets/browser/core/dist/index.js",
        "@worldorbit/core/load": "../assets/browser/core/dist/load.js",
        "@worldorbit/core/scene": "../assets/browser/core/dist/scene.js",
        "@worldorbit/core/types": "../assets/browser/core/dist/types.js",
        "@worldorbit/viewer": "../assets/browser/viewer/dist/index.js",
        "@worldorbit/viewer/viewer-state": "../assets/browser/viewer/dist/viewer-state.js",
        "@worldorbit/markdown": "../assets/browser/markdown/dist/index.js",
        "@worldorbit/editor": "../assets/browser/editor/dist/index.js"
        }
      }
      </script>
  <script type="module" src="studio.js"></script>
</body>

</html>
